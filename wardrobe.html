<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Filter — Wardrobe Shopping</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════ */
:root {
  --bg:        #f7f3ee;
  --bg2:       #eee8e0;
  --card:      #ffffff;
  --ink:       #111a17;
  --ink2:      #3d4d47;
  --muted:     #7d8c85;
  --line:      #e0d9d0;
  --g:         #0f7a62;
  --g2:        #084f3d;
  --g-glow:    rgba(15,122,98,.18);
  --coral:     #ff5a45;
  --amber:     #f5b638;
  --pick:      #0f7a62;
  --r:         16px;
  --r2:        24px;
  --sh-sm:     0 2px 10px rgba(15,26,22,.07);
  --sh:        0 8px 32px rgba(15,26,22,.11);
  --sh-lg:     0 20px 60px rgba(15,26,22,.17);
  --dur:       .28s;
  --ease:      cubic-bezier(.34,1.4,.64,1);
}

/* ═══════════════════════════════════════════════════════
   RESET / BASE
═══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:"DM Sans",sans-serif;
  font-size:15px;
  line-height:1.5;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img{display:block;max-width:100%;height:100%;object-fit:cover}
button{font-family:inherit;cursor:pointer;border:0;background:none;outline:none;-webkit-tap-highlight-color:transparent}
input{font-family:inherit;outline:none;border:none}
a{text-decoration:none;color:inherit}

/* noise texture */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
}

/* ═══════════════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════════════ */
#nav{
  position:sticky;top:0;z-index:80;
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;
  background:rgba(247,243,238,.92);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid rgba(224,217,208,.7);
}
.nav-logo{
  font-size:20px;font-weight:900;
  color:var(--g2);letter-spacing:-.04em;
  flex:0 0 auto;
}
.nav-logo span{color:var(--coral);}

/* search bar */
.search-wrap{
  flex:1;position:relative;display:flex;align-items:center;
}
.search-icon{
  position:absolute;left:12px;
  color:var(--muted);font-size:15px;pointer-events:none;
}
#search-input{
  width:100%;
  background:var(--bg2);
  border:1.5px solid transparent;
  border-radius:999px;
  padding:9px 14px 9px 36px;
  font-size:14px;color:var(--ink);
  transition:border-color var(--dur),box-shadow var(--dur);
}
#search-input::placeholder{color:var(--muted);}
#search-input:focus{
  border-color:var(--g);
  box-shadow:0 0 0 3px var(--g-glow);
}

.picks-trigger{
  flex:0 0 auto;position:relative;
  width:42px;height:42px;border-radius:50%;
  background:var(--g);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 6px 18px var(--g-glow);
  transition:transform var(--dur);
}
.picks-trigger:active{transform:scale(.92);}
#picks-count{
  position:absolute;top:-3px;right:-3px;
  min-width:18px;height:18px;
  background:var(--coral);color:#fff;
  border-radius:999px;font-size:10px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
  opacity:0;transform:scale(0);
  transition:opacity .2s,transform var(--ease) .1s;
  border:2px solid var(--bg);
}
#picks-count.show{opacity:1;transform:scale(1);}

/* ═══════════════════════════════════════════════════════
   CATEGORY FILTER TABS
═══════════════════════════════════════════════════════ */
#cat-bar{
  display:flex;gap:8px;overflow-x:auto;
  scrollbar-width:none;
  padding:12px 18px;
  position:sticky;top:68px;z-index:70;
  background:rgba(247,243,238,.88);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(224,217,208,.5);
}
#cat-bar::-webkit-scrollbar{display:none}
.cat-tab{
  flex:0 0 auto;
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:999px;
  font-size:13px;font-weight:700;color:var(--muted);
  background:var(--card);border:1.5px solid var(--line);
  box-shadow:var(--sh-sm);
  transition:all .22s var(--ease);
  white-space:nowrap;
}
.cat-tab .tab-ico{font-size:14px;}
.cat-tab.active{
  background:var(--g2);color:#fff;border-color:var(--g2);
  box-shadow:0 6px 18px rgba(8,79,61,.3);
  transform:translateY(-1px);
}
.cat-tab:active{transform:scale(.95) translateY(0);}

/* ═══════════════════════════════════════════════════════
   WARDROBE SECTION LABEL
═══════════════════════════════════════════════════════ */
.ward-head{
  padding:20px 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
.ward-title{
  font-size:22px;font-weight:900;letter-spacing:-.04em;color:var(--ink);
}
.ward-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500;}
.ward-count-pill{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:999px;padding:6px 12px;
  font-size:12px;font-weight:700;color:var(--ink2);
}

/* ═══════════════════════════════════════════════════════
   WARDROBE GRID
═══════════════════════════════════════════════════════ */
#wardrobe-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:0 14px;
  padding-bottom:200px; /* space for bottom panel */
}

/* PRODUCT CARD */
.prod-card{
  background:var(--card);
  border-radius:var(--r2);
  overflow:hidden;
  border:2px solid transparent;
  box-shadow:var(--sh-sm);
  cursor:pointer;
  transition:
    transform var(--dur) var(--ease),
    box-shadow var(--dur),
    border-color var(--dur);
  position:relative;
  animation:cardIn .4s var(--ease) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.prod-card:hover,.prod-card:focus-visible{
  transform:translateY(-5px) scale(1.01);
  box-shadow:var(--sh-lg);
}
.prod-card.picked{
  border-color:var(--g);
  box-shadow:0 0 0 3px var(--g-glow), var(--sh);
}
.prod-card.picking{
  animation:bounce .4s var(--ease);
}
@keyframes bounce{
  0%{transform:scale(1)}
  35%{transform:scale(1.06)}
  65%{transform:scale(.97)}
  100%{transform:scale(1)}
}

/* image area */
.card-img-wrap{
  width:100%;
  aspect-ratio:3/4;
  background:linear-gradient(160deg,#eef9f4,#fdf4e8);
  position:relative;
  overflow:hidden;
}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .35s;}
.prod-card:hover .card-img-wrap img{transform:scale(1.04);}
.card-emoji{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:72px;
}

/* badge */
.card-badge{
  position:absolute;top:10px;left:10px;
  padding:4px 9px;border-radius:999px;
  font-size:10px;font-weight:900;letter-spacing:.04em;
  backdrop-filter:blur(8px);
}
.b-hot{background:rgba(255,90,69,.9);color:#fff;}
.b-new{background:rgba(15,122,98,.9);color:#fff;}
.b-sale{background:rgba(245,182,56,.95);color:#5a3800;}

/* pick check */
.pick-check{
  position:absolute;top:10px;right:10px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.85);
  border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:transparent;
  transition:all .25s var(--ease);
  backdrop-filter:blur(6px);
}
.prod-card.picked .pick-check{
  background:var(--g);border-color:var(--g);color:#fff;
  transform:scale(1.1);
}

/* card body */
.card-body{
  padding:11px 12px 13px;
}
.card-cat{
  font-size:10px;font-weight:700;color:var(--g);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;
}
.card-name{
  font-size:14px;font-weight:800;letter-spacing:-.02em;
  line-height:1.2;color:var(--ink);margin-bottom:8px;
}
.card-price-row{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.card-price{
  font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-.03em;
}
.card-old{
  font-size:11px;color:#b0b8b4;text-decoration:line-through;font-weight:500;
}
.quick-btn{
  width:30px;height:30px;border-radius:50%;
  background:var(--bg2);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--ink2);
  transition:all .2s;flex:0 0 auto;
}
.quick-btn:hover,.quick-btn:active{background:var(--g);color:#fff;border-color:var(--g);}

/* empty state */
#empty-state{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px;gap:12px;
  animation:cardIn .3s ease both;
}
#empty-state .empty-ico{font-size:52px;opacity:.5;}
#empty-state p{font-size:15px;color:var(--muted);text-align:center;font-weight:500;}

/* ═══════════════════════════════════════════════════════
   STICKY PICKS PANEL (BOTTOM)
═══════════════════════════════════════════════════════ */
#picks-panel{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:90;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--line);
  border-radius:28px 28px 0 0;
  box-shadow:0 -8px 40px rgba(15,26,22,.12);
  transform:translateY(100%);
  transition:transform .4s var(--ease);
  padding-bottom:env(safe-area-inset-bottom,12px);
  max-height:55vh;
  display:flex;flex-direction:column;
}
#picks-panel.visible{transform:translateY(0);}

.panel-drag{
  width:36px;height:4px;background:var(--line);
  border-radius:999px;margin:10px auto 0;flex:0 0 auto;
}

.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px 8px;flex:0 0 auto;
}
.panel-title{
  font-size:16px;font-weight:900;letter-spacing:-.03em;
}
.panel-title span{color:var(--g);}
.panel-actions{display:flex;gap:8px;align-items:center;}
.panel-clear{
  font-size:12px;font-weight:700;color:var(--coral);
  padding:5px 10px;border-radius:999px;
  background:rgba(255,90,69,.08);
  transition:background .2s;
}
.panel-clear:hover{background:rgba(255,90,69,.15);}

/* horizontal picks strip */
#picks-strip{
  display:flex;gap:10px;
  overflow-x:auto;scrollbar-width:none;
  padding:4px 18px 10px;
  flex:0 0 auto;
  scroll-snap-type:x mandatory;
}
#picks-strip::-webkit-scrollbar{display:none}

.pick-chip{
  flex:0 0 auto;scroll-snap-align:start;
  width:72px;
  position:relative;
  animation:chipIn .3s var(--ease) both;
}
@keyframes chipIn{
  from{opacity:0;transform:scale(.7)}
  to{opacity:1;transform:scale(1)}
}
.pick-chip-img{
  width:72px;height:88px;
  border-radius:14px;overflow:hidden;
  background:linear-gradient(135deg,#eef9f4,#fdf4e8);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
  border:2px solid var(--line);
  position:relative;
}
.pick-chip-img img{width:100%;height:100%;object-fit:cover;}
.pick-chip-remove{
  position:absolute;top:-6px;right:-6px;
  width:20px;height:20px;border-radius:50%;
  background:var(--coral);color:#fff;
  font-size:11px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(255,90,69,.4);
  transition:transform .2s var(--ease);
  z-index:2;
}
.pick-chip-remove:hover,.pick-chip-remove:active{transform:scale(1.2);}
.pick-chip-price{
  font-size:11px;font-weight:800;text-align:center;margin-top:5px;color:var(--ink);
}

/* panel CTA area */
.panel-cta{
  padding:10px 18px 14px;flex:0 0 auto;
}
.panel-total{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.total-label{font-size:13px;color:var(--muted);font-weight:600;}
.total-val{font-size:20px;font-weight:900;letter-spacing:-.04em;color:var(--ink);}
.cta-row{display:grid;grid-template-columns:1fr 1.6fr;gap:8px;}
.cta-compare{
  background:var(--bg2);color:var(--ink2);
  border-radius:14px;padding:13px 12px;
  font-size:13px;font-weight:700;
  border:1.5px solid var(--line);
  text-align:center;transition:all .2s;
}
.cta-compare:hover{background:var(--line);}
.cta-buy{
  background:var(--g);color:#fff;
  border-radius:14px;padding:13px 16px;
  font-size:14px;font-weight:800;
  box-shadow:0 8px 24px rgba(15,122,98,.32);
  text-align:center;transition:all .2s var(--ease);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.cta-buy:hover,.cta-buy:active{background:var(--g2);transform:scale(.98);}

/* ═══════════════════════════════════════════════════════
   QUICK VIEW BOTTOM SHEET
═══════════════════════════════════════════════════════ */
#overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(15,26,22,0);pointer-events:none;
  transition:background .3s;
}
#overlay.open{background:rgba(15,26,22,.55);pointer-events:all;}

#sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:110;
  max-height:88vh;
  background:var(--card);
  border-radius:28px 28px 0 0;
  box-shadow:var(--sh-lg);
  transform:translateY(110%);
  transition:transform .42s var(--ease);
  display:flex;flex-direction:column;
  overflow:hidden;
  padding-bottom:env(safe-area-inset-bottom,16px);
}
#sheet.open{transform:translateY(0);}

.sheet-drag{width:40px;height:4px;background:var(--line);border-radius:999px;margin:12px auto 0;flex:0 0 auto;}
.sheet-scroll{overflow-y:auto;flex:1;}

.sheet-img{
  height:220px;background:linear-gradient(160deg,#eef9f4,#fdf4e8);
  display:flex;align-items:center;justify-content:center;font-size:90px;
  position:relative;overflow:hidden;margin:14px 18px;
  border-radius:20px;
}
.sheet-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}

.sheet-body{padding:0 18px 20px;}
.sheet-badges{display:flex;gap:6px;margin-bottom:10px;}
.sheet-cat-tag{
  font-size:11px;font-weight:700;color:var(--g);
  text-transform:uppercase;letter-spacing:.1em;
}
.sheet-name{font-size:24px;font-weight:900;letter-spacing:-.05em;line-height:1.1;margin-bottom:8px;}
.sheet-desc{font-size:14px;color:var(--ink2);line-height:1.65;margin-bottom:18px;}
.sheet-price-row{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.sheet-price{font-size:28px;font-weight:900;letter-spacing:-.05em;}
.sheet-old{font-size:16px;color:#b0b8b4;text-decoration:line-through;font-weight:500;}
.sheet-save{
  background:rgba(245,182,56,.15);color:#8a5c00;
  border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;
}
.sheet-actions{display:grid;grid-template-columns:56px 1fr;gap:10px;}
.sheet-pick-btn{
  width:56px;height:56px;border-radius:16px;
  background:var(--bg2);border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:all .25s var(--ease);
}
.sheet-pick-btn.active{background:var(--g);border-color:var(--g);}
.sheet-pick-btn.active::after{content:"✓";font-size:22px;}
.sheet-pick-btn:not(.active)::after{content:"＋";}
.sheet-buy-btn{
  height:56px;background:var(--g);color:#fff;
  border-radius:16px;font-size:16px;font-weight:800;
  box-shadow:0 8px 24px rgba(15,122,98,.32);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s var(--ease);
}
.sheet-buy-btn:hover,.sheet-buy-btn:active{background:var(--g2);transform:scale(.98);}

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
#toast-wrap{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  z-index:200;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;
  width:min(340px,calc(100vw - 36px));
}
.toast{
  background:var(--ink);color:#fff;
  padding:12px 18px;border-radius:14px;
  font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  animation:toastIn .4s var(--ease) both, toastOut .35s ease .16s both forwards;
  animation-delay:0s, var(--tdur,2.6s);
  white-space:nowrap;
}
.toast .toast-ico{font-size:16px;flex:0 0 auto;}
.toast.green{background:var(--g);}
.toast.red{background:var(--coral);}
.toast.amber{background:#b27200;color:#fff;}
@keyframes toastIn{
  from{opacity:0;transform:translateY(-12px) scale(.9)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes toastOut{
  from{opacity:1;transform:scale(1)}
  to{opacity:0;transform:scale(.9)}
}

/* ═══════════════════════════════════════════════════════
   COMBO DEAL BANNER
═══════════════════════════════════════════════════════ */
#combo-banner{
  margin:16px 14px 0;
  background:linear-gradient(135deg,var(--g2),#1d6e56);
  border-radius:20px;padding:16px 18px;color:#fff;
  display:none;align-items:center;gap:14px;
  animation:cardIn .4s var(--ease) both;
  box-shadow:0 8px 28px rgba(8,79,61,.25);
}
#combo-banner.show{display:flex;}
.combo-ico{font-size:32px;flex:0 0 auto;}
.combo-text{flex:1;}
.combo-tag{font-size:10px;font-weight:800;color:var(--amber);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.combo-title{font-size:15px;font-weight:800;letter-spacing:-.03em;line-height:1.2;}
.combo-sub{font-size:12px;opacity:.65;margin-top:2px;}
.combo-cta{
  background:var(--amber);color:#5a3800;
  border-radius:12px;padding:8px 12px;
  font-size:12px;font-weight:800;white-space:nowrap;flex:0 0 auto;
  transition:transform .2s;
}
.combo-cta:hover{transform:scale(1.04);}

/* ═══════════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════════ */
.footer{
  text-align:center;padding:32px 18px;
  color:var(--muted);font-size:12px;line-height:1.7;
}
.footer b{color:var(--g2);}

/* ═══════════════════════════════════════════════════════
   HAPTIC RIPPLE (tap feedback)
═══════════════════════════════════════════════════════ */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(15,122,98,.25);
  transform:scale(0);
  animation:rippleOut .5s ease-out forwards;
  pointer-events:none;z-index:5;
}
@keyframes rippleOut{
  to{transform:scale(3.5);opacity:0;}
}

/* ═══════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════ */
@media(min-width:500px){
  #wardrobe-grid{grid-template-columns:repeat(3,1fr);}
  .card-emoji{font-size:80px;}
}
@media(min-width:768px){
  #wardrobe-grid{grid-template-columns:repeat(4,1fr);max-width:800px;margin:0 auto;}
  #picks-panel,#sheet{max-width:480px;left:50%;right:auto;transform:translateX(-50%) translateY(100%);}
  #picks-panel.visible{transform:translateX(-50%) translateY(0);}
  #sheet.open{transform:translateX(-50%) translateY(0);}
  #combo-banner{max-width:800px;margin-inline:auto;}
  .ward-head{max-width:800px;margin:0 auto;}

<!-- ═══════════════════════════════════════════════════

<script>
/* ── PRODUCT DATA ─────────────────────────────────── */

  {

    link:"#"
  },
  {

    name:"Foam Roller Pro",
    emoji:"🟠",
    badge:"Sale", badgeCls:"b-sale",
    price:549, priceStr:"₹549", old:"₹899",
    note:"↓39% off",
    desc:"High-density EVA foam. Textured surface for deep tissue. Full-body recovery in 10 mins.",
    link:"#"
  },
  {
    id:12, cat:"supplements",
    name:"Multivitamin Daily 60 tabs",
    emoji:"💊",
    badge:"Top Rated", badgeCls:"b-new",
    price:449, priceStr:"₹449", old:"₹699",
    note:"Best quality",
    desc:"23 essential vitamins & minerals. No artificial colours. Once-a-day formula. 2 months supply.",
    link:"#"
  },
];

/* ── STATE ────────────────────────────────────────── */
let picks = new Set();       // Set of product ids
let activeCat = "all";
let searchQuery = "";
let sheetProductId = null;
let panelOpen = false;

/* ── FILTER LOGIC ─────────────────────────────────── */
function filteredProducts(){
  return PRODUCTS.filter(p=>{
    const matchCat = activeCat === "all" || p.cat === activeCat;
    const matchSearch = !searchQuery ||
      p.name.toLowerCase().includes(searchQuery) ||
      p.cat.toLowerCase().includes(searchQuery);
    return matchCat && matchSearch;
  });
}

/* ── RENDER GRID ──────────────────────────────────── */
function renderGrid(){
  const grid = document.getElementById("wardrobe-grid");
  const prods = filteredProducts();
  const countEl = document.getElementById("ward-count");

  countEl.textContent = prods.length + " item" + (prods.length!==1?"s":"");

  if(prods.length === 0){
    grid.innerHTML = `
      <div id="empty-state">
        <div class="empty-ico">🔍</div>
        <p>No products match your search.<br>Try a different filter.</p>
      </div>`;
    return;
  }

  grid.innerHTML = prods.map((p, i) => {
    const isPicked = picks.has(p.id);
    return `
    <article class="prod-card${isPicked?" picked":""}"
      data-id="${p.id}"
      style="animation-delay:${Math.min(i*.06,.4)}s"
      onclick="handleCardClick(event, ${p.id})"
      role="button" tabindex="0"
      aria-label="${p.name}">
      <div class="card-img-wrap">
        <div class="card-emoji">${p.emoji}</div>
        <span class="card-badge ${p.badgeCls}">${p.badge}</span>
        <div class="pick-check" aria-hidden="true">${isPicked?"✓":""}</div>
      </div>
      <div class="card-body">
        <div class="card-cat">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price-row">
          <div>
            <span class="card-price">${p.priceStr}</span>
            ${p.old?`<span class="card-old"> ${p.old}</span>`:""}
          </div>
          <button class="quick-btn" onclick="event.stopPropagation();openSheet(${p.id})" aria-label="Quick view">
            ↗
          </button>
        </div>
      </div>
    </article>`;
  }).join("");
}

/* tap logic: first tap = pick, rapid second tap = quick view */
let lastTap = {id:null, t:0};
function handleCardClick(e, id){
  addRipple(e);
  const now = Date.now();
  if(lastTap.id === id && now - lastTap.t < 400){
    openSheet(id);
    lastTap = {id:null, t:0};
    return;
  }
  lastTap = {id, t:now};
  togglePick(id);
}

function addRipple(e){
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * .7;
  const x = (e.clientX||e.touches?.[0]?.clientX||rect.left+rect.width/2) - rect.left - size/2;
  const y = (e.clientY||e.touches?.[0]?.clientY||rect.top+rect.height/2) - rect.top - size/2;
  const r = document.createElement("div");
  r.className = "ripple";
  r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
  card.appendChild(r);
  setTimeout(()=>r.remove(), 600);
}

/* ── TOGGLE PICK ──────────────────────────────────── */
function togglePick(id){
  const card = document.querySelector(`.prod-card[data-id="${id}"]`);
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;

  if(picks.has(id)){
    picks.delete(id);
    if(card){
      card.classList.remove("picked","picking");
      card.querySelector(".pick-check").textContent = "";
    }
    showToast(`Removed: ${p.name}`,"✕","red");
  } else {
    picks.add(id);
    if(card){
      card.classList.add("picked","picking");
      card.querySelector(".pick-check").textContent = "✓";
      setTimeout(()=>card.classList.remove("picking"),450);
    }
    showToast(`Added: ${p.name}`,"✓","green");
    // haptic-like flash
    if(navigator.vibrate) navigator.vibrate([12]);
  }

  renderPicksPanel();
  updateNav();
  updateComboBanner();
  if(sheetProductId === id) updateSheetPickBtn();
}

/* ── PICKS PANEL ──────────────────────────────────── */
function renderPicksPanel(){
  const strip = document.getElementById("picks-strip");
  const pickedProds = PRODUCTS.filter(p=>picks.has(p.id));

  if(pickedProds.length === 0){
    hidePanel();
    return;
  }

  strip.innerHTML = pickedProds.map(p=>`
    <div class="pick-chip">
      <div class="pick-chip-img">
        <span>${p.emoji}</span>
        <button class="pick-chip-remove" onclick="togglePick(${p.id})" aria-label="Remove ${p.name}">✕</button>
      </div>
      <div class="pick-chip-price">${p.priceStr}</div>
    </div>
  `).join("");

  document.getElementById("panel-count-label").textContent = `(${picks.size})`;

  const total = pickedProds.reduce((s,p)=>s+p.price,0);
  document.getElementById("panel-total").textContent =
    "₹" + total.toLocaleString("en-IN");

  showPanel();
}

function showPanel(){
  const panel = document.getElementById("picks-panel");
  panel.classList.add("visible");
  panelOpen = true;
}
function hidePanel(){
  const panel = document.getElementById("picks-panel");
  panel.classList.remove("visible");
  panelOpen = false;
}
function togglePanel(){
  if(picks.size === 0){ showToast("Tap products to add picks!","👆","amber"); return; }
  panelOpen ? hidePanel() : showPanel();
}
function clearAll(){
  picks.clear();
  document.querySelectorAll(".prod-card.picked").forEach(c=>{
    c.classList.remove("picked");
    c.querySelector(".pick-check").textContent = "";
  });
  renderPicksPanel();
  updateNav();
  updateComboBanner();
  showToast("Cleared all picks","🗑️");
}
function openCart(){
  showPanel();
  document.getElementById("picks-panel").scrollIntoView({behavior:"smooth"});
}

/* ── NAV COUNTER ──────────────────────────────────── */
function updateNav(){
  const el = document.getElementById("picks-count");
  if(picks.size > 0){
    el.textContent = picks.size;
    el.classList.add("show");
  } else {
    el.classList.remove("show");
  }
}

/* ── COMBO BANNER ─────────────────────────────────── */
function updateComboBanner(){
  const banner = document.getElementById("combo-banner");
  const n = picks.size;
  if(n >= 2){
    banner.classList.add("show");
    document.getElementById("combo-title").textContent =
      n >= 4 ? `🔥 Amazing combo! ${n} picks, best price guaranteed` :
      n === 3 ? `Great set of ${n}! Compare bundle prices now` :
      `Pick ${4-n} more for the best bundle deal`;
    document.getElementById("combo-sub").textContent =
      n >= 4 ? "Tap 'See Deal' to get combined discount" :
      "Keep adding for a bigger saving";
  } else {
    banner.classList.remove("show");
  }
}

/* ── QUICK VIEW SHEET ─────────────────────────────── */
function openSheet(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;
  sheetProductId = id;

  const imgEl = document.getElementById("s-img");
  imgEl.innerHTML = `<span style="font-size:90px;position:relative;z-index:1">${p.emoji}</span>`;

  document.getElementById("s-cat").textContent = p.cat + " · " + p.badge;
  document.getElementById("s-name").textContent = p.name;
  document.getElementById("s-desc").textContent = p.desc;
  document.getElementById("s-price").textContent = p.priceStr;
  document.getElementById("s-old").textContent = p.old || "";
  document.getElementById("s-link").href = p.link;

  // calc savings
  if(p.old){
    const oldNum = parseInt(p.old.replace(/[^\d]/g,""));
    const saved = oldNum - p.price;
    const pct = Math.round(saved/oldNum*100);
    document.getElementById("s-save").textContent = `Save ₹${saved.toLocaleString("en-IN")} (${pct}%)`;
    document.getElementById("s-save").style.display = "";
  } else {
    document.getElementById("s-save").style.display = "none";
  }

  updateSheetPickBtn();

  document.getElementById("sheet").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function updateSheetPickBtn(){
  const btn = document.getElementById("s-pick");
  if(!btn || sheetProductId===null) return;
  btn.classList.toggle("active", picks.has(sheetProductId));
}

function togglePickFromSheet(){
  if(sheetProductId !== null) togglePick(sheetProductId);
}

function closeSheet(){
  document.getElementById("sheet").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
  sheetProductId = null;
}

// swipe down to close sheet
let swipeStartY = 0;
document.getElementById("sheet").addEventListener("touchstart",e=>{swipeStartY=e.touches[0].clientY;},{passive:true});
document.getElementById("sheet").addEventListener("touchend",e=>{
  if(e.changedTouches[0].clientY - swipeStartY > 80) closeSheet();
},{passive:true});

// swipe down to close panel
let panSwipeY = 0;
document.getElementById("picks-panel").addEventListener("touchstart",e=>{panSwipeY=e.touches[0].clientY;},{passive:true});
document.getElementById("picks-panel").addEventListener("touchend",e=>{
  if(e.changedTouches[0].clientY - panSwipeY > 60) hidePanel();
},{passive:true});

/* ── CATEGORY TABS ────────────────────────────────── */
document.querySelectorAll(".cat-tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".cat-tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    renderGrid();
  });
});

/* ── SEARCH ───────────────────────────────────────── */
let searchTimer;
document.getElementById("search-input").addEventListener("input",e=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{
    searchQuery = e.target.value.trim().toLowerCase();
    renderGrid();
  }, 220);
});

/* ── TOAST ────────────────────────────────────────── */
function showToast(msg, ico="✓", type="", dur=2800){
  const wrap = document.getElementById("toast-wrap");
  const el = document.createElement("div");
  el.className = "toast" + (type?" "+type:"");
  el.style.setProperty("--tdur", dur/1000+"s");
  el.innerHTML = `<span class="toast-ico">${ico}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), dur + 400);
}

/* ── INIT ─────────────────────────────────────────── */
renderGrid();
</script>
